# Primary Server: Handles the main site and uploads
server {
    listen 8080;
    host 127.0.0.1;
    server_name example.com www.example.com; 
    
    # Root directory for this server
    root ./www;
    index index.html;
    
    # 1MB limit for uploads
    client_max_body_size 1000000;

    # Custom Error Pages (Ensure these files exist in ./www)
    error_page 404 /404.html;
    error_page 500 502 503 /50x.html;

    # Default Location
    location / {
        methods GET;
        autoindex on; # Allows directory listing
    }

    # Uploads Location
    # Note: If your project treats 'root' as the path prepended to URI, 
    # ensure this points to the correct folder.
    location /upload {
        methods POST DELETE;
        root ./;      # This makes the full path ./upload/
        index upload.html;
    }

    # CGI Location
    location /cgi-bin {
        methods GET POST;
        cgi_path /usr/bin/python3;
        cgi_ext .py;
    }
}

# Secondary Server: Handles test traffic
server 
{
    listen 9090;
    host 0.0.0.0;
    server_name test.com;
    root ./test_site;

    location / {
        methods GET POST;
        index test.html;
    }
}