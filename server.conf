server {
    listen 8080;
    host 127.0.0.1;
    server_name example.com www.example.com; # help me
    root ./www;
    index index.html;
    client_max_body_size 1000000;

    error_page 404 /404.html;
    error_page 500 502 503 /50x.html;

    location / {
        methods GET;
        autoindex on;
    }

    location /upload {
        methods POST DELETE;
        root ./uploads;
        index upload.html;
    }

    location /cgi-bin {
        methods GET POST;
        cgi_path /usr/bin/python3;
        cgi_ext .py;
    }
}

server {
    listen 9090;
    host 0.0.0.0;
    server_name test.com;
    root ./test_site;

    location / {
        methods GET POST;
        index test.html;
    }
} # yo man how are you?